name: Automated Validation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Check TypeScript Compilation
      run: npx tsc --noEmit
      
    - name: Run Jest Test Suite
      run: npm run test
      env:
        # Mock keys to ensure tests pass without hitting real APIs
        GEMINI_API_KEY: 'ci_mock_key'
